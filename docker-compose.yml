services:
  spark:
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-lakehouse-pyspark
    container_name: retail_lakehouse_spark
    working_dir: /app
    volumes:
      - .:/app
    command: python notebooks/test_spark_session.py
  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: retail-lakehouse-airflow
    container_name: retail_lakehouse_airflow
    working_dir: /app
    volumes:
      - .:/app
      - ./dags:/opt/airflow/dags
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    command: standalone